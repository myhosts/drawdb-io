name: Build & Deploy
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      # 拉取 drawdb 源码
      - name: Checkout drawdb
        uses: actions/checkout@v4
        with:
          repository: drawdb-io/drawdb

      # 设置 Node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 安装依赖 + 构建
      - name: Install & Build
        run: |
          npm ci
          npm run build

      # 发布到 gh-pages
      - name: Publish to gh-pages
        uses: chihqiang/gh-pages-action@main
        with:
          publish_dir: dist
          target_branch: gh-pages
          commit_message: Auto deploy
          cname: gh.drawdb.zhiqiang.wang
          token: ${{ secrets.REPO_TOKEN }}